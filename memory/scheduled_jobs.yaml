- cron: 0 8 * * *
  display_name: 晨间简报
  enabled: true
  id: morning_brief
  output_dir: null
  prompt: 请生成今日晨间简报，总结近期重点事项、今日日程安排和值得关注的信息。
- cron: 0 23 * * *
  display_name: 日终复盘
  enabled: true
  id: daily_report
  output_dir: null
  prompt: 请生成今日工作复盘报告，总结今天的聊天记录、完成的任务和学习内容。
- cron: 0 21 * * 0
  display_name: 周报
  enabled: true
  id: weekly_report
  output_dir: null
  prompt: 请生成本周周报，总结本周的工作、学习和成长轨迹。
- cron: 0 22 28-31 3,6,9,12 *
  display_name: 季报
  enabled: true
  id: quarterly_report
  output_dir: null
  prompt: 请生成本季度季报，回顾本季度的目标达成情况和成长轨迹。
- cron: 0 21 * * *
  display_name: 学习推送
  enabled: true
  id: learning_daily_push
  output_dir: null
  prompt: 请推送今日学习内容，从进行中的课程中选取一个知识点出题复习。
- cron: 0 7 * * *
  display_name: 世界新闻采集
  enabled: true
  id: world_fetch
  output_dir: null
  prompt: 请采集今日世界新闻并存储到本地。
